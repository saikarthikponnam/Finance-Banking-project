spring.application.name=financebanking

# Server Configuration
server.port=8080

# Database Configuration (H2 File Database)
spring.datasource.url=jdbc:h2:file:./db/finance_db;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JPA & Hibernate Configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console Configuration (extremely useful for presentation)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JWT Configuration Properties
app.jwt.secret=9a4f985536467389274950294839201029304928103948201920394820192348
app.jwt.expiration-ms=86400000
